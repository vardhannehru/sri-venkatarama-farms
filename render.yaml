databases:
  - name: shop-app-db
    databaseName: shop_app
    user: shop_app_user
    plan: free

services:
  - type: web
    name: shop-app
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shop-app-db
          property: connectionString
